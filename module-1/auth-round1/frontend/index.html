<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Round 1</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
    input { display: block; width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
    button { padding: 10px 20px; cursor: pointer; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; cursor: pointer; border: 1px solid #ccc; background: #f5f5f5; }
    .tab.active { background: #333; color: white; }
    .hidden { display: none; }
    #message { margin-top: 10px; color: green; }
    #error { margin-top: 10px; color: red; }
  </style>
</head>
<body>
  <h2>Auth System - Round 1</h2>
  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Login</div>
    <div class="tab" onclick="showTab('register')">Register</div>
    <div class="tab" onclick="showTab('reset')">Reset Password</div>
  </div>

  <div id="login">
    <input id="login-email" type="email" placeholder="Email" />
    <input id="login-password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <div id="register" class="hidden">
    <input id="reg-email" type="email" placeholder="Email" />
    <input id="reg-password" type="password" placeholder="Password" />
    <button onclick="register()">Register</button>
  </div>

  <div id="reset" class="hidden">
    <input id="reset-email" type="email" placeholder="Email" />
    <input id="reset-password" type="password" placeholder="New Password" />
    <button onclick="resetPassword()">Reset Password</button>
  </div>

  <div id="message"></div>
  <div id="error"></div>

  <script>
    const API = 'http://localhost:3001';

    function showTab(tab) {
      ['login', 'register', 'reset'].forEach(t => {
        document.getElementById(t).classList.add('hidden');
        document.querySelectorAll('.tab')[['login','register','reset'].indexOf(t)].classList.remove('active');
      });
      document.getElementById(tab).classList.remove('hidden');
      document.querySelectorAll('.tab')[['login','register','reset'].indexOf(tab)].classList.add('active');
      document.getElementById('message').textContent = '';
      document.getElementById('error').textContent = '';
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        document.getElementById('message').textContent = 'Login successful! Token saved.';
      } else {
        document.getElementById('error').textContent = data.error;
      }
    }

    async function register() {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('message').textContent = data.message;
      } else {
        document.getElementById('error').textContent = data.error;
      }
    }

    async function resetPassword() {
      const email = document.getElementById('reset-email').value;
      const newPassword = document.getElementById('reset-password').value;
      const res = await fetch(`${API}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, newPassword })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('message').textContent = data.message;
      } else {
        document.getElementById('error').textContent = data.error;
      }
    }
  </script>
</body>
</html>
